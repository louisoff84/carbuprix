<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carbu-prix | Proximité</title>
    <style>
        :root { --main: #10b981; --bg: #f3f4f6; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        .container { max-width: 500px; margin: 0 auto; }
        .header { text-align: center; background: white; padding: 20px; border-radius: 15px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .ville-nom { color: var(--main); font-weight: 900; font-size: 1.4rem; margin-top: 5px; display: block; }
        .card { background: white; padding: 15px; border-radius: 15px; margin-bottom: 10px; position: relative; border: 1px solid #ddd; }
        .price { position: absolute; top: 15px; right: 15px; color: #ef4444; font-weight: 900; font-size: 1.5rem; }
        .dist { display: inline-block; background: #dcfce7; color: #166534; padding: 3px 8px; border-radius: 5px; font-size: 0.75rem; font-weight: bold; }
        .name { font-weight: bold; display: block; margin: 5px 0; text-transform: uppercase; width: 70%; }
        .fuel { background: #374151; color: white; padding: 2px 7px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; }
        .btn-maps { display: block; text-align: center; background: #4285F4; color: white; text-decoration: none; padding: 12px; border-radius: 10px; margin-top: 10px; font-weight: bold; font-size: 0.8rem; }
        .loading { text-align: center; color: #666; font-size: 0.9rem; padding: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <span style="font-size: 0.8rem; color: #666;">MA VILLE ACTUELLE :</span>
        <span id="ville-header" class="ville-nom">Détection...</span>
    </div>

    <div id="status" class="loading">📡 Activation du GPS...</div>
    <div id="results"></div>
</div>

<script>
    const API_URL = "https://api.craftpick.fr/carbu/api.php";

    async function start() {
        navigator.geolocation.getCurrentPosition(async (pos) => {
            const { latitude, longitude } = pos.coords;
            const status = document.getElementById('status');
            
            try {
                const res = await fetch(`${API_URL}?lat=${latitude}&lon=${longitude}&t=${Date.now()}`);
                const data = await res.json();

                document.getElementById('ville-header').innerText = data.ville_detectee;
                status.style.display = 'none';

                const container = document.getElementById('results');
                container.innerHTML = "";

                data.results.forEach(s => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${s.lat},${s.lon}`;
                    
                    card.innerHTML = `
                        <div class="dist">📍 à ${s.distance} km</div>
                        <div class="price">${s.prix}€</div>
                        <span class="name">${s.nom}</span>
                        <span class="fuel">${s.carbu}</span>
                        <div style="font-size:0.75rem; color:#666; margin-top:8px;">${s.adresse.toLowerCase()}</div>
                        <a href="${mapsUrl}" target="_blank" class="btn-maps">NAVIGUER VERS LA STATION</a>
                    `;
                    container.appendChild(card);
                });
            } catch (e) {
                status.innerText = "❌ Erreur de chargement des données.";
            }
        }, (err) => {
            document.getElementById('status').innerText = "❌ GPS refusé ou indisponible.";
        }, { enableHighAccuracy: true });
    }

    window.onload = start;
</script>
</body>
</html>
