<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carbu-prix | Les plus proches</title>
    <style>
        :root { --brand: #10b981; --accent: #3b82f6; --bg: #f3f4f6; }
        body { font-family: system-ui, sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        .container { max-width: 500px; margin: 0 auto; }
        
        header { text-align: center; margin-bottom: 15px; }
        h1 { color: var(--brand); margin: 0; font-size: 1.8rem; }
        
        .city-header {
            background: #fff; border-left: 5px solid var(--brand);
            padding: 15px; border-radius: 8px; font-weight: bold;
            font-size: 1.2rem; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            display: none;
        }

        .status { text-align: center; font-size: 0.8rem; color: #666; margin-bottom: 15px; }
        
        .card { background: white; padding: 20px; border-radius: 18px; margin-bottom: 12px; position: relative; border: 1px solid #e5e7eb; }
        
        /* Style pour le prix */
        .price { position: absolute; top: 15px; right: 15px; color: #ef4444; font-weight: 900; font-size: 1.5rem; }
        
        /* Étiquette de distance */
        .dist-badge { 
            display: inline-block; background: #e0f2fe; color: var(--accent); 
            padding: 4px 8px; border-radius: 6px; font-size: 0.75rem; font-weight: bold; margin-bottom: 8px;
        }

        .name { font-weight: 800; font-size: 1rem; margin-right: 80px; display: block; text-transform: uppercase; }
        .fuel { display: inline-block; background: #374151; color: white; padding: 3px 8px; border-radius: 6px; font-size: 0.7rem; margin-top: 5px; }
        
        .maps-btn { display: block; text-align: center; margin-top: 15px; padding: 12px; background: #4285F4; color: white; text-decoration: none; border-radius: 10px; font-weight: bold; font-size: 0.85rem; }
        .refresh-btn { background: var(--brand); color: white; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <header><h1>⛽ Carbu-prix</h1></header>

    <div id="city-info" class="city-header"></div>

    <button class="refresh-btn" onclick="startApp()">📍 TROUVER LES PLUS PROCHES</button>
    <div id="status" class="status">Détection de votre ville...</div>
    
    <div id="results"></div>
</div>

<script>
    const API_URL = "https://api.craftpick.fr/carbu/api.php";

    function startApp() {
        const status = document.getElementById('status');
        status.innerHTML = "📡 Calcul de la position...";
        
        navigator.geolocation.getCurrentPosition(async (pos) => {
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;
            
            // 1. Identification de la ville
            try {
                const geo = await fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lon}&localityLanguage=fr`);
                const geoData = await geo.json();
                const city = geoData.city || geoData.locality || "Secteur";
                
                const cityDiv = document.getElementById('city-info');
                cityDiv.innerHTML = "📍 " + city + " (Stations les plus proches)";
                cityDiv.style.display = "block";
            } catch(e) {}

            // 2. Récupération des données triées
            fetchData(lat, lon);
        }, (err) => {
            status.innerHTML = "❌ Erreur GPS : " + err.message;
        }, { enableHighAccuracy: true });
    }

    async function fetchData(lat, lon) {
        const status = document.getElementById('status');
        const container = document.getElementById('results');
        status.innerHTML = "🔍 Recherche des stations à proximité...";

        try {
            const res = await fetch(`${API_URL}?lat=${lat}&lon=${lon}&t=${Date.now()}`);
            const data = await res.json();

            if (data.results && data.results.length > 0) {
                status.innerHTML = "✅ Stations classées par proximité.";
                container.innerHTML = "";
                
                data.results.forEach(s => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${s.geom.lat},${s.geom.lon}`;
                    const distanceLabel = s.dist_km ? s.dist_km.toFixed(1) + " km" : "Près de vous";
                    
                    card.innerHTML = `
                        <div class="dist-badge">📍 à ${distanceLabel}</div>
                        <div class="price">${s.prix_valeur}€</div>
                        <span class="name">${s.nom || 'Station Service'}</span>
                        <div class="fuel">${s.prix_nom}</div>
                        <div style="font-size:0.8rem; color:#666; margin-top:10px;">${s.adresse.toLowerCase()}</div>
                        <a href="${mapsUrl}" target="_blank" class="maps-btn">S'Y RENDRE</a>
                    `;
                    container.appendChild(card);
                });
            } else {
                status.innerHTML = "⚠️ Aucune station trouvée.";
            }
        } catch (e) {
            status.innerHTML = "❌ Erreur serveur.";
        }
    }

    window.onload = startApp;
</script>
</body>
</html>
