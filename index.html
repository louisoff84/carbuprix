<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carbu-prix | Montpellier-Lattes</title>
    <style>
        :root { --brand: #059669; --accent: #dc2626; --bg: #f3f4f6; }
        body { font-family: system-ui, sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        .container { max-width: 500px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 20px; }
        .status-box { background: white; border: 1px solid #ddd; padding: 12px; border-radius: 12px; font-size: 0.85rem; text-align: center; margin-bottom: 15px; }
        .card { background: white; padding: 20px; border-radius: 18px; margin-bottom: 15px; position: relative; border: 1px solid #e5e7eb; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .price { position: absolute; top: 20px; right: 20px; font-size: 1.6rem; font-weight: 900; color: var(--accent); }
        .station-name { font-weight: bold; font-size: 1.1rem; color: #111827; display: block; margin-right: 90px; }
        .fuel-badge { display: inline-block; background: #374151; color: white; padding: 3px 10px; border-radius: 6px; font-size: 0.75rem; margin-top: 8px; font-weight: bold; }
        .address { font-size: 0.85rem; color: #6b7280; margin-top: 10px; }
        .btn-maps { display: block; text-align: center; margin-top: 15px; padding: 12px; background: #4285F4; color: white; text-decoration: none; border-radius: 10px; font-weight: bold; }
        .btn-refresh { background: var(--brand); color: white; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <header><h1>⛽ Carbu-prix</h1></header>
    <button class="btn-refresh" onclick="getLocation()">📍 MA POSITION ACTUELLE</button>
    <div id="status" class="status-box">Cliquez sur le bouton pour démarrer...</div>
    <div id="results"></div>
</div>

<script>
    const API_URL = "https://api.craftpick.fr/carbu/api.php";

    function getLocation() {
        document.getElementById('status').innerHTML = "⏳ Localisation GPS en cours...";
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(sendPosition, showError, {
                enableHighAccuracy: true,
                timeout: 10000,
                maximumAge: 0
            });
        }
    }

    async function sendPosition(position) {
        const lat = position.coords.latitude;
        const lon = position.coords.longitude;
        const status = document.getElementById('status');
        
        status.innerHTML = `📍 Ma position : <b>${lat.toFixed(4)}, ${lon.toFixed(4)}</b><br>Chargement des stations les moins chères...`;

        try {
            // Ajout d'un paramètre aléatoire pour forcer le rafraîchissement
            const response = await fetch(`${API_URL}?lat=${lat}&lon=${lon}&_=${Date.now()}`);
            const data = await response.json();

            const container = document.getElementById('results');
            container.innerHTML = "";

            if (data.results && data.results.length > 0) {
                status.innerHTML += " ✅";
                data.results.forEach(s => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    // Utilisation des coordonnées de la station pour Google Maps
                    const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${s.geom.lat},${s.geom.lon}`;
                    
                    card.innerHTML = `
                        <div class="price">${s.prix_valeur}€</div>
                        <span class="station-name">${s.nom || 'Station Service'}</span>
                        <div class="fuel-badge">${s.prix_nom}</div>
                        <div class="address">${s.adresse.toLowerCase()}, ${s.ville}</div>
                        <a href="${mapsUrl}" target="_blank" class="btn-maps">🗺️ Y ALLER (GOOGLE MAPS)</a>
                    `;
                    container.appendChild(card);
                });
            } else {
                status.innerHTML = "⚠️ Aucune station trouvée à moins de 15km de Lattes/Montpellier.";
            }
        } catch (error) {
            status.innerHTML = "❌ Erreur de connexion à api.craftpick.fr";
        }
    }

    function showError(error) {
        document.getElementById('status').innerHTML = "❌ Erreur GPS : " + error.message;
    }

    // Lancement automatique
    window.onload = getLocation;
</script>
</body>
</html>
